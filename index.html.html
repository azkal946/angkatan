<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Database Angkatan 2022</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --border: #2a2a3a;
    --success: #43d9a2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .blob1 {
    position: fixed; top: -200px; left: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(108,99,255,0.15) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .blob2 {
    position: fixed; bottom: -150px; right: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(255,101,132,0.1) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  header {
    padding: 48px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 24px;
  }

  .header-badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -1px;
  }

  h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-meta {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
  }

  .stats-row {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }

  .stat-item { text-align: center; }

  .stat-num {
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--success));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: block;
  }

  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .controls {
    display: flex;
    gap: 16px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 240px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px 12px 44px;
    border-radius: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }

  select {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  select:focus { border-color: var(--accent); }

  .btn-add {
    background: linear-gradient(135deg, var(--accent), #8b85ff);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: opacity 0.2s, transform 0.15s;
    white-space: nowrap;
  }

  .btn-add:hover { opacity: 0.9; transform: translateY(-1px); }

  .view-toggle {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .view-btn {
    background: none;
    border: none;
    color: var(--muted);
    padding: 12px 14px;
    cursor: pointer;
    font-size: 15px;
    transition: all 0.2s;
  }

  .view-btn.active { background: var(--accent); color: white; }

  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }

  thead {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 14px 20px;
    text-align: left;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    transition: color 0.2s;
  }

  th:hover { color: var(--text); }

  td {
    padding: 12px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 14px;
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(108,99,255,0.04); }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 12px;
    flex-shrink: 0;
  }

  .name-cell {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .name-info .name { font-weight: 600; font-size: 14px; }
  .name-info .npm {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .contact-link {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .contact-link:hover { opacity: 0.7; }

  /* GRID VIEW */
  .grid-view {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .member-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeUp 0.4s ease both;
  }

  .member-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .card-avatar {
    width: 46px; height: 46px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 800;
    flex-shrink: 0;
  }

  .card-name { font-weight: 700; font-size: 14px; line-height: 1.3; }
  .card-npm {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
  }

  .card-divider {
    height: 1px;
    background: var(--border);
    margin: 12px 0;
  }

  .card-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    margin-bottom: 6px;
  }

  .card-icon { color: var(--muted); font-size: 13px; flex-shrink: 0; }
  .card-row a { color: var(--accent); text-decoration: none; font-family: 'Space Mono', monospace; font-size: 11px; }
  .card-row a:hover { opacity: 0.7; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 520px;
    animation: modalIn 0.25s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .modal-title { font-size: 20px; font-weight: 800; }

  .modal-close {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .modal-close:hover { color: var(--text); border-color: var(--accent); }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }

  label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  input[type="text"], input[type="tel"] {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 14px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  .form-actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  .btn-cancel {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 12px 20px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { color: var(--text); border-color: var(--accent); }

  .btn-save {
    background: linear-gradient(135deg, var(--accent), #8b85ff);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-save:hover { opacity: 0.9; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

  .action-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 5px 7px;
    border-radius: 6px;
    font-size: 13px;
    transition: background 0.2s;
    color: var(--muted);
  }

  .action-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
  .action-btn.del:hover { color: var(--accent2); }

  .hidden { display: none !important; }

  /* Pagination */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-top: 24px;
    padding-bottom: 48px;
    flex-wrap: wrap;
  }

  .page-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }

  .page-btn:hover { border-color: var(--accent); color: var(--text); }
  .page-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .page-info {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin: 0 8px;
  }

  @media (max-width: 640px) {
    .form-grid { grid-template-columns: 1fr; }
    .table-wrap { overflow-x: auto; }
    table { min-width: 500px; }
  }
</style>
</head>

</div>

let nextId = 98;
let currentView = 'table';
let sortKey = null, sortAsc = true;
let editingId = null;
let currentPage = 1;
let perPage = 20;

function getInitials(name) {
  return name.trim().split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

function getColor(id) { return COLORS[(id-1) % COLORS.length]; }

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let filtered = data.filter(m =>
    !q || m.nama.toLowerCase().includes(q) || m.npm.includes(q) || m.wa.includes(q)
  );
  if (sortKey) {
    filtered.sort((a,b) => {
      const r = a[sortKey].localeCompare(b[sortKey]);
      return sortAsc ? r : -r;
    });
  }
  return filtered;
}

function getPaged(filtered) {
  if (perPage >= filtered.length) return filtered;
  const start = (currentPage - 1) * perPage;
  return filtered.slice(start, start + perPage);
}

function render() {
  const filtered = getFiltered();
  const paged = getPaged(filtered);

  document.getElementById('stat-count').textContent = filtered.length;
  document.getElementById('stat-shown').textContent = paged.length;
  document.getElementById('stat-total').textContent = data.length;

  renderTable(paged, filtered);
  renderGrid(paged, filtered);
  renderPagination(filtered.length);
}

function renderTable(paged, filtered) {
  const tbody = document.getElementById('table-body');
  const empty = document.getElementById('empty-table');

  if (!paged.length) {
    tbody.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  const startNum = (currentPage - 1) * perPage + 1;
  tbody.innerHTML = paged.map((m, i) => {
    const [fg, bg] = getColor(m.id);
    const waClean = m.wa.replace(/\s/g,'');
    const waLink = waClean.startsWith('62') ? waClean : '62' + waClean.replace(/^0/,'');
    return `<tr>
      <td style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)">${startNum+i}</td>
      <td>
        <div class="name-cell">
          <div class="avatar" style="background:${bg};color:${fg}">${getInitials(m.nama)}</div>
          <div class="name-info">
            <div class="name">${m.nama}</div>
            <div class="npm">${m.npm}</div>
          </div>
        </div>
      </td>
      <td style="font-family:'Space Mono',monospace;font-size:12px;color:var(--muted)">${m.npm}</td>
      <td><a class="contact-link" href="https://wa.me/${waLink}" target="_blank">📱 ${m.wa}</a></td>
      <td>
        <button class="action-btn" onclick="editData(${m.id})" title="Edit">✎</button>
        <button class="action-btn del" onclick="deleteData(${m.id})" title="Hapus">✕</button>
      </td>
    </tr>`;
  }).join('');
}

function renderGrid(paged, filtered) {
  const grid = document.getElementById('grid-view');
  const empty = document.getElementById('empty-grid');

  if (!paged.length) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  grid.innerHTML = paged.map((m, i) => {
    const [fg, bg] = getColor(m.id);
    const waClean = m.wa.replace(/\s/g,'');
    const waLink = waClean.startsWith('62') ? waClean : '62' + waClean.replace(/^0/,'');
    return `<div class="member-card" style="animation-delay:${i*0.03}s">
      <div class="card-top">
        <div class="card-avatar" style="background:${bg};color:${fg}">${getInitials(m.nama)}</div>
        <div>
          <div class="card-name">${m.nama}</div>
          <div class="card-npm">${m.npm}</div>
        </div>
      </div>
      <div class="card-divider"></div>
      <div class="card-row"><span class="card-icon">📱</span><a href="https://wa.me/${waLink}" target="_blank">${m.wa}</a></div>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button class="action-btn" style="flex:1;border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--muted)" onclick="editData(${m.id})">✎ Edit</button>
        <button class="action-btn del" style="flex:1;border:1px solid var(--border);border-radius:8px;font-size:12px" onclick="deleteData(${m.id})">✕ Hapus</button>
      </div>
    </div>`;
  }).join('');
}

function renderPagination(total) {
  const pg = document.getElementById('pagination');
  if (perPage >= total) { pg.innerHTML = ''; return; }

  const totalPages = Math.ceil(total / perPage);
  let html = '';

  html += `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>←</button>`;

  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1) {
      html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    } else if (Math.abs(i - currentPage) === 2) {
      html += `<span class="page-info">…</span>`;
    }
  }

  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>→</button>`;
  html += `<span class="page-info">${(currentPage-1)*perPage+1}–${Math.min(currentPage*perPage,total)} dari ${total}</span>`;
  pg.innerHTML = html;
}

function goPage(p) {
  const filtered = getFiltered();
  const totalPages = Math.ceil(filtered.length / perPage);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function changePerPage() {
  perPage = parseInt(document.getElementById('per-page').value);
  currentPage = 1;
  render();
}

function setView(v) {
  currentView = v;
  document.getElementById('table-view').classList.toggle('hidden', v !== 'table');
  document.getElementById('grid-view').classList.toggle('hidden', v !== 'grid');
  document.getElementById('empty-grid').classList.add('hidden');
  document.getElementById('btn-table').classList.toggle('active', v === 'table');
  document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
  render();
}

function sortBy(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  render();
}

function openModal(id = null) {
  editingId = id;
  document.getElementById('modal-title').textContent = id ? 'Edit Mahasiswa' : 'Tambah Mahasiswa';
  if (id) {
    const m = data.find(d => d.id === id);
    document.getElementById('f-nama').value = m.nama;
    document.getElementById('f-npm').value = m.npm;
    document.getElementById('f-wa').value = m.wa;
  } else {
    ['f-nama','f-npm','f-wa'].forEach(fid => document.getElementById(fid).value = '');
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
}

function saveData() {
  const nama = document.getElementById('f-nama').value.trim();
  const npm = document.getElementById('f-npm').value.trim();
  if (!nama || !npm) { alert('Nama dan NPM wajib diisi!'); return; }
  const entry = {
    id: editingId || nextId++,
    nama, npm,
    wa: document.getElementById('f-wa').value.trim(),
  };
  if (editingId) {
    data = data.map(d => d.id === editingId ? entry : d);
  } else {
    data.push(entry);
  }
  closeModal();
  render();
}

function editData(id) { openModal(id); }

function deleteData(id) {
  const m = data.find(d => d.id === id);
  if (confirm(`Hapus ${m.nama}?`)) {
    data = data.filter(d => d.id !== id);
    render();
  }
}

document.getElementById('search').addEventListener('input', () => { currentPage = 1; render(); });
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

render();
</script>
